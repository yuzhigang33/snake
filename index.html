<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>

<script>
	var nowDirection='right';//定义当前移动方向
	var nextDirection='right';//下次移动方向
	var isPaused=false;//是否暂停
	
	function updateSnakeHeadDirection(){//更新蛇头方向
		var snakeHead=document.getElementById("snakeHead");
		snakeHead.className='snake direction-'+nowDirection;
	}
	
	function snakeMove(){//移动蛇身
		if(isPaused) return;//如果暂停则不移动
		var snakeBody=document.getElementsByName('snake');
		
		//记录蛇头位置
		var snakeHeadLeft=snakeBody.item(0).style.left;
		var snakeHeadTop=snakeBody.item(0).style.top;
		var snakeBodyLeft=null;//当前节点的坐标
		var snakeBodyTop=null;
		
		//移动蛇头
		nowDirection=nextDirection;//改变当前移动方向
		updateSnakeHeadDirection();//更新蛇头方向
		if(nextDirection=='left'){
			snakeBody.item(0).style.left=(parseInt(snakeBody.item(0).style.left)-20+600)%600+'px';
		}else if(nextDirection=='right'){
			snakeBody.item(0).style.left=(parseInt(snakeBody.item(0).style.left)+20)%600+'px';
		}else if(nextDirection=='up'){
			snakeBody.item(0).style.top=(parseInt(snakeBody.item(0).style.top)-20+400)%400+'px';
		}else if(nextDirection=='down'){
			snakeBody.item(0).style.top=(parseInt(snakeBody.item(0).style.top)+20)%400+'px';
		}
		
		
		for(var i=1;i<snakeBody.length;i++){//移动蛇身
			//保存当前节点坐标
			snakeBodyLeft=snakeBody.item(i).style.left;
			snakeBodyTop=snakeBody.item(i).style.top;
			//移动当前节点
			snakeBody.item(i).style.left=snakeHeadLeft;
			snakeBody.item(i).style.top=snakeHeadTop;
			//初始化下个节点的移动位置
			snakeHeadLeft=snakeBodyLeft;
			snakeHeadTop=snakeBodyTop;
		}
		
		//判断是否吃到食物
		if(checkFood(snakeBody)){//如果吃到食物蛇身加长
			//蛇身加长
			snakeBodyAdd(snakeBody,snakeHeadLeft,snakeHeadTop);
		}
	}
	
	function snakeBodyAdd(snakeBody,Left,Top){
		var screens=document.getElementById("screen");//获取screen对象
		var newBody=snakeBody.item(snakeBody.length-1).cloneNode(true);
		newBody.style.left=Left;
		newBody.style.top=Top;
		newBody.className='snake snake-body';
		screens.appendChild(newBody);//添加节点
	}
	
	function checkFood(subSnakeBody){
		var food=document.getElementById("food");
		var snakeHead=document.getElementById("snakeHead");
		if(snakeHead.style.left==food.style.left&&snakeHead.style.top==food.style.top){//吃到食物
			//生成新食物
			newFood();
			return true;
		}
		return false;
	}
	
	function newFood(){
		var foodLeft=parseInt(Math.random()*30)*20 + 'px';
		var foodTop=parseInt(Math.random()*20)*20 +'px';
		var food=document.getElementById("food");
		food.style.left=foodLeft;
		food.style.top=foodTop;
	}
	
	function main()
	{
		var screens=document.getElementById("screen");
		screens.focus();
		screens.onkeydown=function(e){controlDeriction(e);};//控制方向
		window.setInterval("snakeMove()",200);
	}
		
	function togglePause(){//暂停/继续游戏
		isPaused=!isPaused;
		document.getElementById("pauseBtn").value=isPaused?"继续":"暂停";
	}
		
	function controlDeriction(e){//控制方向判断下次移动的方向
		e = e|| window.event;
		//阻止浏览器默认事件
		if(e.keyCode==37&&nowDirection!='right') nextDirection = 'left';
		else if(e.keyCode==38&&nowDirection!='down') nextDirection = 'up';
		else if(e.keyCode==39&&nowDirection!='left') nextDirection = 'right';
		else if(e.keyCode==40&&nowDirection!='up') nextDirection = 'down';
		}
</script>
<style type="text/css">
body{
	margin:0;
	padding:0;
	background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
	font-family:Arial, sans-serif;
}
#screen{
	width:600px;
	height:400px;
	position:absolute;
	left:50%;
	top:50%;
	transform:translate(-50%, -50%);
	background:#0f3460;
	border:3px solid #e94560;
	border-radius:10px;
	box-shadow:0 0 30px rgba(233, 69, 96, 0.3);
}
.snake{
	border:0px;
	position:absolute; 
	width:20px; 
	height:20px; 
}
.snake-body{
	background:radial-gradient(circle at 30% 30%, #4ecca3, #2d8a6b);
	border-radius:50%;
	box-shadow:0 0 5px rgba(78, 204, 163, 0.5);
}
#snakeHead{
	z-index:10;
}
.head-svg{
	width:100%;
	height:100%;
	filter:drop-shadow(0 0 3px rgba(78, 204, 163, 0.8));
}
#snakeHead.direction-up{
	transform:rotate(-90deg);
}
#snakeHead.direction-down{
	transform:rotate(90deg);
}
#snakeHead.direction-left{
	transform:rotate(180deg);
}
#snakeHead.direction-right{
	transform:rotate(0deg);
}
#food{
	background:radial-gradient(circle at 30% 30%, #ff6b6b, #ee5a5a);
	border-radius:50%;
	box-shadow:0 0 10px rgba(255, 107, 107, 0.6);
	animation:pulse 1s ease-in-out infinite;
}
@keyframes pulse{
	0%, 100%{transform:scale(1);}
	50%{transform:scale(1.1);}
}
.controls{
	position:absolute;
	bottom:20px;
	left:50%;
	transform:translateX(-50%);
	text-align:center;
}
.controls input{
	background:#e94560;
	color:white;
	border:none;
	padding:10px 25px;
	margin:0 5px;
	border-radius:25px;
	cursor:pointer;
	font-size:14px;
	transition:all 0.3s;
}
.controls input:hover{
	background:#ff6b6b;
	transform:scale(1.05);
}
</style>
</head>

<body>
<div id="screen" tabindex="0">
<div id="snakeHead" name="snake" class="snake direction-right" style="top:100px; left:100px;">
	<svg class="head-svg" viewBox="0 0 20 20">
		<defs>
			<linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
				<stop offset="0%" style="stop-color:#4ecca3;stop-opacity:1" />
				<stop offset="100%" style="stop-color:#2d8a6b;stop-opacity:1" />
			</linearGradient>
		</defs>
		<ellipse cx="10" cy="10" rx="9" ry="9" fill="url(#headGrad)"/>
		<circle cx="14" cy="7" r="2.5" fill="white"/>
		<circle cx="14" cy="7" r="1.5" fill="black"/>
		<circle cx="14" cy="13" r="2.5" fill="white"/>
		<circle cx="14" cy="13" r="1.5" fill="black"/>
		<ellipse cx="18" cy="10" rx="3" ry="4" fill="#ff6b6b"/>
	</svg>
</div>
<div name="snake" class="snake snake-body" style="top:100px; left:80px;"></div>
<div name="snake" class="snake snake-body" style="top:100px; left:60px;"></div>
<div name="snake" class="snake snake-body" style="top:100px; left:40px;"></div>
<div name="snake" class="snake snake-body" style="top:100px; left:20px;"></div>
<div id="food" class="snake" style="top:100px; left:200px;"></div>
</div>
<div class="controls">
	<input type="button" onclick="main()" value="开始"/>
	<input type="button" id="pauseBtn" onclick="togglePause()" value="暂停"/>
</div>

</body>
</html>
