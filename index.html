<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>贪吃蛇游戏</title>
<script>
	// 游戏配置
	var GRID_SIZE = 28;
	var COLS = 28; // 列数
	var ROWS = 20; // 行数
	var CANVAS_WIDTH = COLS * GRID_SIZE; // 784
	var CANVAS_HEIGHT = ROWS * GRID_SIZE; // 560
	
	// 游戏状态
	var snake = []; // 蛇身数组，每个元素是 {x, y}
	var food = { x: 10, y: 5 };
	var foodEmoji = '🍎';
	var direction = 'right';
	var nextDirection = 'right';
	var isPaused = false;
	var isGameRunning = false;
	var gameTimer = null;
	var canvas = null;
	var ctx = null;
	var score = 0; // 游戏得分
	
	// 食物emoji列表
	var foodEmojis = ['🍎','🍌','🍇','🍓','🍑','🍍','🥝','🍒','🍉','🍊','🍋','🥭','🍐','🍏','🫐','🍈','🍅','🥑','🥕','🌽','🥨','🥐','🥯','🍞','🥖','🧀','🥚','🥓','🍗','🍖','🌭','🍔','🍟','🍕','🥪','🌮','🌯','🫔','🥙','🧆','🥘','🍝','🍜','🍲','🍛','🍣','🍱','🥟','🍤','🍙','🍚','🍘','🍥','🥠','🥮','🍢','🍡','🍧','🍨','🍦','🥧','🧁','🍰','🎂','🍮','🍭','🍬','🍫','🍿','🍩','🍪','🌰','🥜'];
	
	// 初始化
	function init() {
		canvas = document.getElementById('gameCanvas');
		ctx = canvas.getContext('2d');
		
		// 初始化蛇的位置（5节）
		resetSnake();
		
		// 生成食物
		generateFood();
		
		// 绘制初始画面
		draw();
		
		// 键盘事件
		document.addEventListener('keydown', handleKeyDown);
	}
	
	function resetSnake() {
		snake = [
			{ x: 5, y: 5 }, // 蛇头
			{ x: 4, y: 5 },
			{ x: 3, y: 5 },
			{ x: 2, y: 5 },
			{ x: 1, y: 5 }
		];
		direction = 'right';
		nextDirection = 'right';
		score = 0; // 重置得分
	}
	
	function generateFood() {
		var validPosition = false;
		while (!validPosition) {
			food.x = Math.floor(Math.random() * COLS);
			food.y = Math.floor(Math.random() * ROWS);
			
			// 确保食物不在蛇身上
			validPosition = true;
			for (var i = 0; i < snake.length; i++) {
				if (snake[i].x === food.x && snake[i].y === food.y) {
					validPosition = false;
					break;
				}
			}
		}
		// 随机选择食物emoji
		foodEmoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
	}
	
	function handleKeyDown(e) {
		if (!isGameRunning) return;
		
		switch(e.keyCode) {
			case 37: // 左
				if (direction !== 'right') nextDirection = 'left';
				break;
			case 38: // 上
				if (direction !== 'down') nextDirection = 'up';
				break;
			case 39: // 右
				if (direction !== 'left') nextDirection = 'right';
				break;
			case 40: // 下
				if (direction !== 'up') nextDirection = 'down';
				break;
		}
	}
	
	function startGame() {
		if (isGameRunning) return;
		
		isGameRunning = true;
		isPaused = false;
		
		document.getElementById('startBtn').disabled = true;
		document.getElementById('startBtn').style.opacity = '0.5';
		document.getElementById('pauseBtn').disabled = false;
		document.getElementById('pauseBtn').style.opacity = '1';
		document.getElementById('pauseBtn').value = '暂停';
		
		// 开始游戏循环
		gameTimer = setInterval(gameLoop, 200);
	}
	
	function togglePause() {
		if (!isGameRunning) return;
		
		isPaused = !isPaused;
		document.getElementById('pauseBtn').value = isPaused ? '继续' : '暂停';
	}
	
	function restartGame() {
		// 停止游戏
		if (gameTimer) {
			clearInterval(gameTimer);
			gameTimer = null;
		}
		
		isGameRunning = false;
		isPaused = false;
		
		// 隐藏游戏结束弹窗
		document.getElementById('gameOverModal').style.display = 'none';
		
		// 重置按钮状态
		document.getElementById('startBtn').disabled = false;
		document.getElementById('startBtn').style.opacity = '1';
		document.getElementById('pauseBtn').value = '暂停';
		document.getElementById('pauseBtn').disabled = true;
		document.getElementById('pauseBtn').style.opacity = '0.5';
		
		// 重置游戏状态
		resetSnake();
		generateFood();
		updateScoreDisplay();
		draw();
	}
	
	function gameLoop() {
		if (isPaused) return;
		
		update();
		draw();
	}
	
	function update() {
		// 更新方向
		direction = nextDirection;
		
		// 计算新蛇头位置
		var head = snake[0];
		var newHead = { x: head.x, y: head.y };
		
		switch(direction) {
			case 'left':
				newHead.x--;
				break;
			case 'right':
				newHead.x++;
				break;
			case 'up':
				newHead.y--;
				break;
			case 'down':
				newHead.y++;
				break;
		}
		
		// 处理穿墙
		if (newHead.x < 0) newHead.x = COLS - 1;
		else if (newHead.x >= COLS) newHead.x = 0;
		if (newHead.y < 0) newHead.y = ROWS - 1;
		else if (newHead.y >= ROWS) newHead.y = 0;
		
		// 检查是否撞到自己（蛇头与蛇身重叠）
		for (var i = 0; i < snake.length; i++) {
			if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
				// 游戏结束
				gameOver();
				return;
			}
		}
		
		// 检查是否吃到食物
		var ateFood = (newHead.x === food.x && newHead.y === food.y);
		
		// 移动蛇：在头部添加新位置
		snake.unshift(newHead);
		
		// 如果没吃到食物，移除尾部
		if (!ateFood) {
			snake.pop();
		} else {
			// 吃到食物，得分+10，更新显示，生成新食物
			score += 10;
			updateScoreDisplay();
			generateFood();
		}
	}
	
	function gameOver() {
		// 停止游戏
		if (gameTimer) {
			clearInterval(gameTimer);
			gameTimer = null;
		}
		
		isGameRunning = false;
		isPaused = false;
		
		// 显示游戏结束弹窗
		document.getElementById('finalScore').textContent = '得分: ' + score;
		document.getElementById('gameOverModal').style.display = 'flex';
		
		// 重置按钮状态 - 开始游戏置灰，只能点重新开始
		document.getElementById('startBtn').disabled = true;
		document.getElementById('startBtn').style.opacity = '0.3';
		document.getElementById('pauseBtn').value = '暂停';
		document.getElementById('pauseBtn').disabled = true;
		document.getElementById('pauseBtn').style.opacity = '0.5';
	}
	
	function updateScoreDisplay() {
		document.getElementById('scoreBoard').textContent = '得分: ' + score;
	}
	
	function draw() {
		// 清空画布
		ctx.fillStyle = '#0a0a0a';
		ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
		
		// 绘制网格
		ctx.strokeStyle = '#1a1a2e';
		ctx.lineWidth = 1;
		for (var i = 0; i <= COLS; i++) {
			ctx.beginPath();
			ctx.moveTo(i * GRID_SIZE, 0);
			ctx.lineTo(i * GRID_SIZE, CANVAS_HEIGHT);
			ctx.stroke();
		}
		for (var i = 0; i <= ROWS; i++) {
			ctx.beginPath();
			ctx.moveTo(0, i * GRID_SIZE);
			ctx.lineTo(CANVAS_WIDTH, i * GRID_SIZE);
			ctx.stroke();
		}
		
		// 绘制蛇身
		for (var i = 1; i < snake.length; i++) {
			drawSnakeBody(snake[i].x, snake[i].y);
		}
		
		// 绘制蛇头
		drawSnakeHead(snake[0].x, snake[0].y, direction);
		
		// 绘制食物
		drawFood(food.x, food.y);
	}
	
	function drawSnakeBody(x, y) {
		var cx = x * GRID_SIZE + GRID_SIZE / 2;
		var cy = y * GRID_SIZE + GRID_SIZE / 2;
		var radius = GRID_SIZE / 2 - 3;
		
		// 创建径向渐变 - 霓虹绿色
		var gradient = ctx.createRadialGradient(
			cx - radius * 0.3, cy - radius * 0.3, radius * 0.1,
			cx, cy, radius
		);
		gradient.addColorStop(0, '#00ff88');
		gradient.addColorStop(0.7, '#00cc6a');
		gradient.addColorStop(1, '#00994f');
		
		ctx.fillStyle = gradient;
		ctx.beginPath();
		ctx.arc(cx, cy, radius, 0, Math.PI * 2);
		ctx.fill();
		
		// 添加发光效果
		ctx.shadowColor = '#00ff88';
		ctx.shadowBlur = 8;
		ctx.strokeStyle = '#00ff88';
		ctx.lineWidth = 1;
		ctx.stroke();
		ctx.shadowBlur = 0;
	}
	
	function drawSnakeHead(x, y, dir) {
		var cx = x * GRID_SIZE + GRID_SIZE / 2;
		var cy = y * GRID_SIZE + GRID_SIZE / 2;
		var radius = GRID_SIZE / 2 - 3;
		
		ctx.save();
		ctx.translate(cx, cy);
		
		// 根据方向旋转
		switch(dir) {
			case 'up':
				ctx.rotate(-Math.PI / 2);
				break;
			case 'down':
				ctx.rotate(Math.PI / 2);
				break;
			case 'left':
				ctx.rotate(Math.PI);
				break;
			case 'right':
				ctx.rotate(0);
				break;
		}
		
		// 发光效果
		ctx.shadowColor = '#00ff88';
		ctx.shadowBlur = 12;
		
		// 绘制蛇头主体 - 霓虹绿色
		var gradient = ctx.createRadialGradient(
			-radius * 0.3, -radius * 0.3, radius * 0.1,
			0, 0, radius
		);
		gradient.addColorStop(0, '#00ff88');
		gradient.addColorStop(0.6, '#00cc6a');
		gradient.addColorStop(1, '#00994f');
		
		ctx.fillStyle = gradient;
		ctx.beginPath();
		ctx.arc(0, 0, radius, 0, Math.PI * 2);
		ctx.fill();
		
		// 关闭发光
		ctx.shadowBlur = 0;
		
		// 绘制眼睛 - 发光白色
		ctx.fillStyle = '#ffffff';
		ctx.shadowColor = '#ffffff';
		ctx.shadowBlur = 4;
		ctx.beginPath();
		ctx.arc(radius * 0.35, -radius * 0.3, radius * 0.22, 0, Math.PI * 2);
		ctx.fill();
		ctx.beginPath();
		ctx.arc(radius * 0.35, radius * 0.3, radius * 0.22, 0, Math.PI * 2);
		ctx.fill();
		ctx.shadowBlur = 0;
		
		// 绘制瞳孔
		ctx.fillStyle = '#0a0a0a';
		ctx.beginPath();
		ctx.arc(radius * 0.4, -radius * 0.3, radius * 0.12, 0, Math.PI * 2);
		ctx.fill();
		ctx.beginPath();
		ctx.arc(radius * 0.4, radius * 0.3, radius * 0.12, 0, Math.PI * 2);
		ctx.fill();
		
		// 绘制舌头 - 霓虹粉色
		ctx.fillStyle = '#ff00aa';
		ctx.shadowColor = '#ff00aa';
		ctx.shadowBlur = 6;
		ctx.beginPath();
		ctx.ellipse(radius * 0.85, 0, radius * 0.25, radius * 0.35, 0, 0, Math.PI * 2);
		ctx.fill();
		ctx.shadowBlur = 0;
		
		ctx.restore();
	}
	
	function drawFood(x, y) {
		var cx = x * GRID_SIZE + GRID_SIZE / 2;
		var cy = y * GRID_SIZE + GRID_SIZE / 2;
		
		ctx.font = '22px Arial';
		ctx.textAlign = 'center';
		ctx.textBaseline = 'middle';
		ctx.fillText(foodEmoji, cx, cy);
	}
	
	// 页面加载完成后初始化
	window.onload = init;
</script>
<style>
body {
	margin: 0;
	padding: 0;
	background: linear-gradient(135deg, #0d0d0d 0%, #1a1a2e 50%, #16213e 100%);
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
	min-height: 100vh;
}

#gameContainer {
	position: absolute;
	left: 50%;
	top: 50%;
	transform: translate(-50%, -50%);
	text-align: center;
}

#gameCanvas {
	background: #0a0a0a;
	border: 2px solid #00ff88;
	border-radius: 12px;
	box-shadow: 
		0 0 20px rgba(0, 255, 136, 0.3),
		0 0 40px rgba(0, 255, 136, 0.1),
		inset 0 0 30px rgba(0, 255, 136, 0.05);
	display: block;
}

.controls {
	margin-top: 25px;
}

.controls input {
	background: transparent;
	color: #00ff88;
	border: 2px solid #00ff88;
	padding: 12px 30px;
	margin: 0 8px;
	border-radius: 30px;
	cursor: pointer;
	font-size: 14px;
	font-weight: 600;
	letter-spacing: 1px;
	text-transform: uppercase;
	transition: all 0.3s ease;
	box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
}

.controls input:hover:not(:disabled) {
	background: #00ff88;
	color: #0a0a0a;
	box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
	transform: translateY(-2px);
}

.controls input:disabled {
	cursor: not-allowed;
	border-color: #444;
	color: #666;
	box-shadow: none;
}

/* 得分显示 */
#scoreBoard {
	position: absolute;
	top: -50px;
	left: 0;
	color: #00ff88;
	font-size: 24px;
	font-weight: bold;
	text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
	font-family: 'Segoe UI', sans-serif;
}

/* 游戏结束弹窗 */
#gameOverModal {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0, 0, 0, 0.8);
	display: flex;
	justify-content: center;
	align-items: center;
	z-index: 100;
}

.modal-content {
	background: linear-gradient(135deg, #1a1a2e 0%, #0a0a0a 100%);
	border: 2px solid #ff0044;
	border-radius: 15px;
	padding: 40px 60px;
	text-align: center;
	box-shadow: 0 0 30px rgba(255, 0, 68, 0.4);
}

.modal-content h2 {
	color: #ff0044;
	font-size: 36px;
	margin: 0 0 20px 0;
	text-shadow: 0 0 15px rgba(255, 0, 68, 0.6);
}

.modal-content p {
	color: #ffffff;
	font-size: 24px;
	margin: 0 0 30px 0;
}

.modal-content input {
	background: transparent;
	color: #ff0044;
	border: 2px solid #ff0044;
	padding: 12px 40px;
	border-radius: 30px;
	cursor: pointer;
	font-size: 16px;
	font-weight: 600;
	transition: all 0.3s ease;
	box-shadow: 0 0 10px rgba(255, 0, 68, 0.3);
}

.modal-content input:hover {
	background: #ff0044;
	color: #0a0a0a;
	box-shadow: 0 0 20px rgba(255, 0, 68, 0.6);
}
</style>
</head>

<body>
<div id="gameContainer">
	<!-- 得分显示区域 -->
	<div id="scoreBoard">得分: 0</div>
	
	<canvas id="gameCanvas" width="784" height="560" tabindex="0"></canvas>
	
	<!-- 游戏结束弹窗 -->
	<div id="gameOverModal" style="display: none;">
		<div class="modal-content">
			<h2>游戏结束</h2>
			<p id="finalScore">得分: 0</p>
			<input type="button" onclick="restartGame()" value="重新开始"/>
		</div>
	</div>
	
	<div class="controls">
		<input type="button" id="startBtn" onclick="startGame()" value="开始游戏"/>
		<input type="button" id="pauseBtn" onclick="togglePause()" value="暂停" disabled/>
		<input type="button" id="restartBtn" onclick="restartGame()" value="重新开始"/>
	</div>
</div>
</body>
</html>
