<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>贪吃蛇游戏</title>
<script>
	// 游戏配置
	var GRID_SIZE = 28;
	var COLS = 28; // 列数
	var ROWS = 20; // 行数
	var CANVAS_WIDTH = COLS * GRID_SIZE; // 784
	var CANVAS_HEIGHT = ROWS * GRID_SIZE; // 560
	
	// 游戏状态
	var snake = []; // 蛇身数组，每个元素是 {x, y}
	var food = { x: 10, y: 5 };
	var foodEmoji = '🍎';
	var direction = 'right';
	var nextDirection = 'right';
	var isPaused = false;
	var isGameRunning = false;
	var gameTimer = null;
	var canvas = null;
	var ctx = null;
	
	// 食物emoji列表
	var foodEmojis = ['🍎','🍌','🍇','🍓','🍑','🍍','🥝','🍒','🍉','🍊','🍋','🥭','🍐','🍏','🫐','🍈','🍅','🥑','🥕','🌽','🥨','🥐','🥯','🍞','🥖','🧀','🥚','🥓','🍗','🍖','🌭','🍔','🍟','🍕','🥪','🌮','🌯','🫔','🥙','🧆','🥘','🍝','🍜','🍲','🍛','🍣','🍱','🥟','🍤','🍙','🍚','🍘','🍥','🥠','🥮','🍢','🍡','🍧','🍨','🍦','🥧','🧁','🍰','🎂','🍮','🍭','🍬','🍫','🍿','🍩','🍪','🌰','🥜'];
	
	// 初始化
	function init() {
		canvas = document.getElementById('gameCanvas');
		ctx = canvas.getContext('2d');
		
		// 初始化蛇的位置（5节）
		resetSnake();
		
		// 生成食物
		generateFood();
		
		// 绘制初始画面
		draw();
		
		// 键盘事件
		document.addEventListener('keydown', handleKeyDown);
	}
	
	function resetSnake() {
		snake = [
			{ x: 5, y: 5 }, // 蛇头
			{ x: 4, y: 5 },
			{ x: 3, y: 5 },
			{ x: 2, y: 5 },
			{ x: 1, y: 5 }
		];
		direction = 'right';
		nextDirection = 'right';
	}
	
	function generateFood() {
		var validPosition = false;
		while (!validPosition) {
			food.x = Math.floor(Math.random() * COLS);
			food.y = Math.floor(Math.random() * ROWS);
			
			// 确保食物不在蛇身上
			validPosition = true;
			for (var i = 0; i < snake.length; i++) {
				if (snake[i].x === food.x && snake[i].y === food.y) {
					validPosition = false;
					break;
				}
			}
		}
		// 随机选择食物emoji
		foodEmoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
	}
	
	function handleKeyDown(e) {
		if (!isGameRunning) return;
		
		switch(e.keyCode) {
			case 37: // 左
				if (direction !== 'right') nextDirection = 'left';
				break;
			case 38: // 上
				if (direction !== 'down') nextDirection = 'up';
				break;
			case 39: // 右
				if (direction !== 'left') nextDirection = 'right';
				break;
			case 40: // 下
				if (direction !== 'up') nextDirection = 'down';
				break;
		}
	}
	
	function startGame() {
		if (isGameRunning) return;
		
		isGameRunning = true;
		isPaused = false;
		
		document.getElementById('startBtn').disabled = true;
		document.getElementById('startBtn').style.opacity = '0.5';
		document.getElementById('pauseBtn').disabled = false;
		document.getElementById('pauseBtn').style.opacity = '1';
		document.getElementById('pauseBtn').value = '暂停';
		
		// 开始游戏循环
		gameTimer = setInterval(gameLoop, 200);
	}
	
	function togglePause() {
		if (!isGameRunning) return;
		
		isPaused = !isPaused;
		document.getElementById('pauseBtn').value = isPaused ? '继续' : '暂停';
	}
	
	function restartGame() {
		// 停止游戏
		if (gameTimer) {
			clearInterval(gameTimer);
			gameTimer = null;
		}
		
		isGameRunning = false;
		isPaused = false;
		
		// 重置按钮状态
		document.getElementById('startBtn').disabled = false;
		document.getElementById('startBtn').style.opacity = '1';
		document.getElementById('pauseBtn').value = '暂停';
		document.getElementById('pauseBtn').disabled = true;
		document.getElementById('pauseBtn').style.opacity = '0.5';
		
		// 重置游戏状态
		resetSnake();
		generateFood();
		draw();
	}
	
	function gameLoop() {
		if (isPaused) return;
		
		update();
		draw();
	}
	
	function update() {
		// 更新方向
		direction = nextDirection;
		
		// 计算新蛇头位置
		var head = snake[0];
		var newHead = { x: head.x, y: head.y };
		
		switch(direction) {
			case 'left':
				newHead.x--;
				break;
			case 'right':
				newHead.x++;
				break;
			case 'up':
				newHead.y--;
				break;
			case 'down':
				newHead.y++;
				break;
		}
		
		// 处理穿墙
		if (newHead.x < 0) newHead.x = COLS - 1;
		else if (newHead.x >= COLS) newHead.x = 0;
		if (newHead.y < 0) newHead.y = ROWS - 1;
		else if (newHead.y >= ROWS) newHead.y = 0;
		
		// 检查是否吃到食物
		var ateFood = (newHead.x === food.x && newHead.y === food.y);
		
		// 移动蛇：在头部添加新位置
		snake.unshift(newHead);
		
		// 如果没吃到食物，移除尾部
		if (!ateFood) {
			snake.pop();
		} else {
			// 吃到食物，生成新食物
			generateFood();
		}
	}
	
	function draw() {
		// 清空画布
		ctx.fillStyle = '#0f3460';
		ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
		
		// 绘制网格（可选，增加视觉效果）
		ctx.strokeStyle = '#1a4a70';
		ctx.lineWidth = 1;
		for (var i = 0; i <= COLS; i++) {
			ctx.beginPath();
			ctx.moveTo(i * GRID_SIZE, 0);
			ctx.lineTo(i * GRID_SIZE, CANVAS_HEIGHT);
			ctx.stroke();
		}
		for (var i = 0; i <= ROWS; i++) {
			ctx.beginPath();
			ctx.moveTo(0, i * GRID_SIZE);
			ctx.lineTo(CANVAS_WIDTH, i * GRID_SIZE);
			ctx.stroke();
		}
		
		// 绘制蛇身
		for (var i = 1; i < snake.length; i++) {
			drawSnakeBody(snake[i].x, snake[i].y);
		}
		
		// 绘制蛇头
		drawSnakeHead(snake[0].x, snake[0].y, direction);
		
		// 绘制食物
		drawFood(food.x, food.y);
	}
	
	function drawSnakeBody(x, y) {
		var cx = x * GRID_SIZE + GRID_SIZE / 2;
		var cy = y * GRID_SIZE + GRID_SIZE / 2;
		var radius = GRID_SIZE / 2 - 2;
		
		// 创建径向渐变
		var gradient = ctx.createRadialGradient(
			cx - radius * 0.3, cy - radius * 0.3, radius * 0.2,
			cx, cy, radius
		);
		gradient.addColorStop(0, '#4ecca3');
		gradient.addColorStop(1, '#2d8a6b');
		
		ctx.fillStyle = gradient;
		ctx.beginPath();
		ctx.arc(cx, cy, radius, 0, Math.PI * 2);
		ctx.fill();
	}
	
	function drawSnakeHead(x, y, dir) {
		var cx = x * GRID_SIZE + GRID_SIZE / 2;
		var cy = y * GRID_SIZE + GRID_SIZE / 2;
		var radius = GRID_SIZE / 2 - 2;
		
		ctx.save();
		ctx.translate(cx, cy);
		
		// 根据方向旋转
		switch(dir) {
			case 'up':
				ctx.rotate(-Math.PI / 2);
				break;
			case 'down':
				ctx.rotate(Math.PI / 2);
				break;
			case 'left':
				ctx.rotate(Math.PI);
				break;
			case 'right':
				ctx.rotate(0);
				break;
		}
		
		// 绘制蛇头主体（椭圆）
		var gradient = ctx.createLinearGradient(-radius, -radius, radius, radius);
		gradient.addColorStop(0, '#4ecca3');
		gradient.addColorStop(1, '#2d8a6b');
		
		ctx.fillStyle = gradient;
		ctx.beginPath();
		ctx.ellipse(0, 0, radius, radius, 0, 0, Math.PI * 2);
		ctx.fill();
		
		// 绘制眼睛
		ctx.fillStyle = 'white';
		ctx.beginPath();
		ctx.arc(radius * 0.4, -radius * 0.3, radius * 0.25, 0, Math.PI * 2);
		ctx.fill();
		ctx.beginPath();
		ctx.arc(radius * 0.4, radius * 0.3, radius * 0.25, 0, Math.PI * 2);
		ctx.fill();
		
		// 绘制瞳孔
		ctx.fillStyle = 'black';
		ctx.beginPath();
		ctx.arc(radius * 0.45, -radius * 0.3, radius * 0.15, 0, Math.PI * 2);
		ctx.fill();
		ctx.beginPath();
		ctx.arc(radius * 0.45, radius * 0.3, radius * 0.15, 0, Math.PI * 2);
		ctx.fill();
		
		// 绘制舌头
		ctx.fillStyle = '#ff6b6b';
		ctx.beginPath();
		ctx.ellipse(radius * 0.9, 0, radius * 0.3, radius * 0.4, 0, 0, Math.PI * 2);
		ctx.fill();
		
		ctx.restore();
	}
	
	function drawFood(x, y) {
		var cx = x * GRID_SIZE + GRID_SIZE / 2;
		var cy = y * GRID_SIZE + GRID_SIZE / 2;
		
		ctx.font = '22px Arial';
		ctx.textAlign = 'center';
		ctx.textBaseline = 'middle';
		ctx.fillText(foodEmoji, cx, cy);
	}
	
	// 页面加载完成后初始化
	window.onload = init;
</script>
<style>
body {
	margin: 0;
	padding: 0;
	background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
	font-family: Arial, sans-serif;
}

#gameContainer {
	position: absolute;
	left: 50%;
	top: 50%;
	transform: translate(-50%, -50%);
	text-align: center;
}

#gameCanvas {
	background: #0f3460;
	border: 3px solid #e94560;
	border-radius: 10px;
	box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
	display: block;
}

.controls {
	margin-top: 20px;
}

.controls input {
	background: #e94560;
	color: white;
	border: none;
	padding: 10px 25px;
	margin: 0 5px;
	border-radius: 25px;
	cursor: pointer;
	font-size: 14px;
	transition: all 0.3s;
}

.controls input:hover:not(:disabled) {
	background: #ff6b6b;
	transform: scale(1.05);
}

.controls input:disabled {
	cursor: not-allowed;
	opacity: 0.5;
}
</style>
</head>

<body>
<div id="gameContainer">
	<canvas id="gameCanvas" width="784" height="560" tabindex="0"></canvas>
	<div class="controls">
		<input type="button" id="startBtn" onclick="startGame()" value="开始游戏"/>
		<input type="button" id="pauseBtn" onclick="togglePause()" value="暂停" disabled/>
		<input type="button" id="restartBtn" onclick="restartGame()" value="重新开始"/>
	</div>
</div>
</body>
</html>
